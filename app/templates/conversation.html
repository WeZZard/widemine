<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ conversation.summary.title }} | Session Viewer</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/css/base.css?v=20260625-detail-highlight-v2" />
  </head>
  <body>
    <script id="conversation-data" type="application/json">{{ conversation_json | safe }}</script>
    <div
      class="workbench-shell dual-workbench"
      data-testid="conversation-workbench"
      data-agent="{{ agent }}"
      data-default-layout="{{ 'reader' if agent == 'opencode' else 'graph' }}"
    >
      <header class="command-bar" data-testid="command-bar">
        <div class="command-left">
          <a class="back-link icon-label" href="{{ back_href or '/' }}" aria-label="Open sessions dashboard">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5 12 3l9 7.5" />
              <path d="M5 10v10h14V10" />
              <path d="M9 20v-6h6v6" />
            </svg>
            <span>Sessions</span>
          </a>
          <div class="history-actions segmented-control" role="group" aria-label="Transcript focus history">
            <button id="returnElementBtn" class="icon-label" aria-label="Backward to previous transcript element" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m15 18-6-6 6-6" />
              </svg>
              <span>Backward</span>
            </button>
            <button id="forwardElementBtn" class="icon-label" aria-label="Forward to returned transcript element" disabled>
              <span>Forward</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 18 6-6-6-6" />
              </svg>
            </button>
          </div>
        </div>
        <div class="session-heading">
          <h1>{{ conversation.summary.title }}</h1>
          <button id="sessionInfoButton" class="session-info-button icon-label" type="button" aria-expanded="false" aria-controls="sessionInfoPopover" aria-label="Show session information">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 11v5" />
              <path d="M12 8h.01" />
            </svg>
          </button>
          <div id="sessionInfoPopover" class="session-info-popover hidden" role="dialog" aria-label="Session information"></div>
        </div>
        <div class="command-actions" aria-label="Transcript actions">
          <button id="searchToggleBtn" class="icon-label search-toggle-button" type="button" data-action="toggle-search" aria-pressed="false" aria-label="Open search">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7" />
              <path d="m16.5 16.5 4 4" />
            </svg>
            <span>Search</span>
          </button>
          <div class="layout-switch segmented-control" role="group" aria-label="Conversation layout">
            <button id="graphLayoutBtn" class="icon-label" data-layout="graph" aria-pressed="true">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 6h16" />
                <path d="M4 12h10" />
                <path d="M4 18h16" />
                <path d="M17 10v4" />
                <path d="M15 12h4" />
              </svg>
              <span>Timeline</span>
            </button>
            <button id="readerLayoutBtn" class="icon-label" data-layout="reader" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 5h6v4H4z" />
                <path d="M14 5h6v14h-6z" />
                <path d="M4 13h6v6H4z" />
              </svg>
              <span>Waterfall</span>
            </button>
          </div>
          <button id="copyLinkBtn" class="icon-label">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1" />
              <path d="M14 11a5 5 0 0 0-7.1 0l-2 2a5 5 0 0 0 7.1 7.1l1.1-1.1" />
            </svg>
            <span>Copy link</span>
          </button>
        </div>
        <div class="header-meta-line">
          <span class="source-line header-source" title="{{ conversation.summary.directory or source.display_path }}">{{ conversation.summary.directory or source.display_path }}</span>
          {% if conversation.summary.git_branch %}
            <span class="source-branch" data-testid="branch-chip" title="Git branch">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 3v12" />
                <path d="M18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
                <path d="M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
                <path d="M18 9a6 6 0 0 1-6 6H9" />
              </svg>
              <span>{{ conversation.summary.git_branch }}</span>
            </span>
          {% endif %}
        </div>
        <div id="linkStatus" class="link-status" aria-live="polite"></div>
      </header>

      <aside id="agentTreeDrawer" class="agent-tree-drawer hidden" data-testid="agent-tree-drawer" aria-label="Agent tree">
        <header class="agent-tree-drawer-header">
          <h2>Agents</h2>
          <button id="agentTreeDrawerClose" class="icon-label" type="button" aria-label="Close agent tree">Close</button>
        </header>
        <div id="agentTree" class="agent-tree" data-testid="subagent-tree" role="tree" aria-label="Agent invocation tree"></div>
      </aside>

      <aside class="left-rail reader-rail" aria-label="Transcript browser">
        <section id="readerSearchPanel" class="reader-search-panel" data-testid="waterfall-search-panel" aria-label="Waterfall search" aria-hidden="true">
          <header class="reader-search-header">
            <div>
              <h2>Search Waterfall</h2>
              <p id="readerSearchStatus" class="search-result-status">No query</p>
            </div>
            <div id="readerSearchBadges" class="search-badge-container" data-testid="waterfall-search-badges"></div>
            <button type="button" class="reader-search-close icon-label" data-action="close-search" aria-label="Close search">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
              </svg>
            </button>
          </header>
          <div class="reader-search-controls">
            <label class="search-input-shell" for="readerSearchInput">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7" />
                <path d="m16.5 16.5 4 4" />
              </svg>
              <input id="readerSearchInput" data-testid="waterfall-search-input" type="search" autocomplete="off" spellcheck="false" placeholder="Search transcript content" />
            </label>
            <div class="search-navigation-controls" role="group" aria-label="Waterfall search navigation">
              <button type="button" data-action="search-prev" data-testid="waterfall-search-previous" aria-label="Previous search result">Prev</button>
              <button type="button" data-action="search-next" data-testid="waterfall-search-next" aria-label="Next search result">Next</button>
            </div>
          </div>
          <div id="readerSearchResults" class="reader-search-results" data-testid="waterfall-search-results" role="list"></div>
        </section>
        <div class="left-pane-header" data-testid="left-pane-header">
          <button id="agentPaneToggle" class="icon-label" type="button" aria-controls="agentTreeDrawer" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 3v18" />
              <path d="M6 7h8a4 4 0 0 1 4 4v1" />
              <path d="M6 15h6a4 4 0 0 0 4-4" />
              <circle cx="18" cy="17" r="3" />
            </svg>
            <span>Agents</span>
          </button>
        </div>
        <section class="rail-section nav-body-section">
          <div id="messageNavPanel" class="left-nav-panel left-nav-scroll-panel" aria-label="Message navigation">
            <div id="messageIndex" class="nav-list message-index" data-testid="message-index"></div>
          </div>
        </section>
        <section id="graphLegendSection" class="rail-section hidden">
          <h2>Legend</h2>
          <div id="flowLegend" class="legend-list" data-testid="flow-legend"></div>
        </section>
      </aside>

      <main id="transcript" class="transcript-surface" data-testid="transcript-root" aria-label="Transcript workspace">
        <section id="readerLayout" class="reader-layout hidden" data-testid="reader-layout" aria-label="Transcript waterfall view">
          <div id="mainContent" class="reader-main-scroll">
            <div id="readerMainStream" class="reader-main-stream"></div>
          </div>
          <div
            id="agentStreamSeparator"
            class="agent-stream-separator"
            role="separator"
            aria-orientation="vertical"
            aria-label="Resize main agent and subagent panels"
            tabindex="0"
            title="Drag to resize main agent and subagent panels"
          ></div>
          <div id="subagentPanelOverlay" class="subagent-panel-overlay" data-testid="subagent-panel-overlay" aria-label="Open subagent panels"></div>
        </section>
        <section id="graphLayout" class="timeline-layout" data-testid="overview-timeline-layout" aria-label="Transcript timeline view">
          <section id="timelineSearchShelf" class="timeline-search-shelf" data-testid="timeline-search-shelf" aria-label="Timeline search" aria-hidden="true">
            <div class="timeline-search-inner">
              <div class="timeline-search-primary">
                <label class="search-input-shell timeline-search-input-shell" for="timelineSearchInput">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="11" cy="11" r="7" />
                    <path d="m16.5 16.5 4 4" />
                  </svg>
                  <input id="timelineSearchInput" data-testid="timeline-search-input" type="search" autocomplete="off" spellcheck="false" placeholder="Search timeline content" />
                </label>
                <span id="timelineSearchStatus" class="search-result-status">No query</span>
                <div id="timelineSearchBadges" class="search-badge-container" data-testid="timeline-search-badges"></div>
                <div class="search-navigation-controls" role="group" aria-label="Timeline search navigation">
                  <button type="button" data-action="search-prev" data-testid="timeline-search-previous" aria-label="Previous search result">Prev</button>
                  <button type="button" data-action="search-next" data-testid="timeline-search-next" aria-label="Next search result">Next</button>
                  <button type="button" data-action="close-search" data-testid="search-clear" aria-label="Close timeline search">Close</button>
                </div>
              </div>
              <div class="timeline-search-options">
                <div class="timeline-search-option-group" role="group" aria-label="Timeline search mode">
                  <span>Mode</span>
                  <button type="button" data-action="set-timeline-search-mode" data-search-mode="context" data-testid="timeline-search-mode-context" aria-pressed="true">Context Graph</button>
                  <button type="button" data-action="set-timeline-search-mode" data-search-mode="hits" data-testid="timeline-search-mode-hits-only" aria-pressed="false">Hits Only</button>
                </div>
                <div class="timeline-search-option-group" role="group" aria-label="Timeline search scope">
                  <span>Scope</span>
                  <button type="button" data-action="set-timeline-search-scope" data-search-scope="all" aria-pressed="true">All</button>
                  <button type="button" data-action="set-timeline-search-scope" data-search-scope="main" aria-pressed="false">Main</button>
                  <button type="button" data-action="set-timeline-search-scope" data-search-scope="subagents" aria-pressed="false">Subagents</button>
                </div>
                <p id="timelineSearchWarning" class="timeline-search-warning" aria-live="polite"></p>
              </div>
            </div>
          </section>
          <div id="graphViewport" class="timeline-viewport" data-testid="overview-timeline">
            <div id="timelineHeader" class="timeline-header" data-testid="timeline-header" aria-label="Pinned agent timeline header"></div>
            <div id="graphSizer" class="timeline-sizer"></div>
            <div id="graphLayer" class="timeline-layer">
              <svg id="graphEdges" class="timeline-connectors" aria-hidden="true"></svg>
              <div id="graphLanes" class="timeline-tracks"></div>
              <div id="graphCapsules" class="timeline-blocks"></div>
            </div>
            <div id="graphSelectionStatus" class="flow-selection-status" data-testid="selected-capsule-summary" aria-live="polite"></div>
          </div>
        </section>
      </main>
    </div>
    <div id="timelineDetailPanel" class="timeline-detail-dock hidden" data-testid="timeline-detail-dock" aria-label="Selected message details"></div>
    <script src="/static/js/text_utils.js?v=20260625-detail-highlight-v2"></script>
    <script src="/static/js/opencode_renderer.js?v=20260625-detail-highlight-v2"></script>
    <script src="/static/js/conversation.js?v=20260625-detail-highlight-v2"></script>
  </body>
</html>
